name: autofix.ci
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔎 Lint (code)
        run: pnpm lint:fix

      - name: ⚙️ Auto-fix
        uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
